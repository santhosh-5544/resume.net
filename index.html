
<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="google-site-verification" content="abc123XYZ" />

<title>Free AI Resume Builder</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<div class="form-section">
<h2>Resume Builder</h2>

<label>Font Size</label>
<input type="number" id="fontsize" value="14">

<input type="text" id="name" placeholder="Full Name">
<input type="text" id="email" placeholder="Email">
<input type="text" id="phone" placeholder="Phone">
<input type="text" id="address" placeholder="Address">

<textarea id="summary" placeholder="Professional Summary"></textarea>
<textarea id="skills" placeholder="Skills"></textarea>
<textarea id="education" placeholder="Education"></textarea>
<textarea id="experience" placeholder="Experience"></textarea>
<textarea id="projects" placeholder="Projects"></textarea>

<button onclick="generateResume()">Generate Resume</button>
<button onclick="downloadPDF()">Download PDF</button>

</div>

<div class="preview-section">
<div id="resume" class="resume">
<h1>Your Name</h1>
<p>Email | Phone</p>
</div>
</div>

</div>

<script src="script.js"></script>

</body>
</html>
